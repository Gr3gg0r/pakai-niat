name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Guard — no secrets tracked in git
        run: |
          set -e
          for f in .env android/key.properties; do
            if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error::$f must never be tracked in git"
              exit 1
            fi
          done
          if git ls-files '*.keystore' '*.jks' | grep -q .; then
            echo "::error::keystore files must never be tracked in git:"
            git ls-files '*.keystore' '*.jks'
            exit 1
          fi
          echo "OK — no secret files tracked."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env from example
        run: cp .env.example .env

      - name: Analyze
        run: flutter analyze

      - name: Test with coverage
        run: flutter test --coverage

      - name: Coverage gate (generated *.g.dart excluded)
        run: bash tool/coverage_check.sh

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: coverage/lcov.info

  android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  ios-build:
    # Release-shape iOS build only on main to save macOS runner minutes.
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
