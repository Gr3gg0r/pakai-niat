name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Assert tag matches pubspec version
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#v}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "Tag: $TAG — pubspec: $PUBSPEC_VERSION"
          if [ "$TAG" != "$PUBSPEC_VERSION" ]; then
            echo "::error::tag v$TAG does not match pubspec version $PUBSPEC_VERSION"
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env from example
        run: cp .env.example .env

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            echo "storeFile=/tmp/release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Extract release notes from CHANGELOG
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#v}"
          # Take the lines between "## [<tag>]" and the next "## [" heading.
          awk -v ver="$TAG" '
            index($0, "## [" ver "]") == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::no CHANGELOG section found for $TAG"
            echo "Release $TAG" > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: build/app/outputs/flutter-apk/app-release.apk
