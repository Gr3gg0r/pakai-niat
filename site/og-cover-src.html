<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #0B0E14;
    --primary: #F59E0B;
    --primary-light: #FBBF24;
    --accent: #34D399;
    --text: #F8FAFC;
    --muted: #94A3B8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1200px; height:630px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  body::before {
    content:""; position:absolute; inset:0;
    background: radial-gradient(65% 65% at 50% 32%, rgba(245,158,11,.16), transparent 70%);
  }
  .logo { width:148px; height:148px; margin-bottom:34px; position:relative; }
  h1 { font-size:78px; font-weight:800; letter-spacing:-.02em; position:relative; }
  h1 .grad {
    background: linear-gradient(100deg, var(--primary), var(--primary-light) 60%, var(--accent));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  p.tagline { margin-top:22px; color:var(--muted); font-size:30px; font-weight:500; letter-spacing:.01em; position:relative; }
</style>
</head>
<body>
  <svg class="logo" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="44" fill="none" stroke="#F59E0B" stroke-width="12"/>
    <circle cx="60" cy="60" r="16" fill="#34D399"/>
  </svg>
  <h1>Pakai <span class="grad">Niat</span></h1>
  <p class="tagline">Say it. Mean it. Do it.</p>
</body>
</html>
